<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Rotina Diária</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f4f4f2;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-warning: #faeeda;
      --text: #1a1a18;
      --text-secondary: #6b6b67;
      --text-info: #185fa5;
      --text-success: #3b6d11;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --border-info: rgba(24,95,165,0.35);
      --border-success: rgba(59,109,17,0.3);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-info: #0c2e4a;
        --bg-success: #172f0a;
        --bg-warning: #3a2302;
        --text: #f0ede8;
        --text-secondary: #999994;
        --text-info: #85b7eb;
        --text-success: #97c459;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
        --border-info: rgba(133,183,235,0.3);
        --border-success: rgba(151,196,89,0.3);
      }
    }

    body {
      background: var(--bg-secondary);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 740px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tab {
      padding: 6px 18px;
      border-radius: 20px;
      border: 0.5px solid var(--border-md);
      font-size: 13px;
      cursor: pointer;
      background: var(--bg);
      color: var(--text-secondary);
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font);
    }

    .tab:hover { background: var(--bg-secondary); }
    .tab.active {
      background: var(--bg-info);
      color: var(--text-info);
      border-color: var(--border-info);
    }

    /* SECTIONS */
    .section { display: none; }
    .section.active { display: block; }

    /* ADD FORM */
    .add-form {
      background: var(--bg);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .add-form h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-row.full { grid-template-columns: 1fr; }

    input[type=text],
    input[type=time],
    select {
      height: 36px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md);
      background: var(--bg-secondary);
      color: var(--text);
      font-size: 13px;
      padding: 0 10px;
      width: 100%;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }

    input:focus, select:focus {
      border-color: var(--border-info);
      box-shadow: 0 0 0 2px rgba(24,95,165,0.15);
    }

    .btn {
      padding: 7px 18px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      font-family: var(--font);
      transition: all .15s;
    }

    .btn:hover { background: var(--bg-secondary); }

    .btn-primary {
      background: var(--bg-info);
      color: var(--text-info);
      border-color: var(--border-info);
    }

    .btn-primary:hover { opacity: .85; }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; gap: 8px; }

    .slot {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      background: var(--bg);
      transition: all .15s;
      cursor: pointer;
    }

    .slot:hover { border-color: var(--border-md); }

    .slot.done { opacity: .5; }
    .slot.done .s-name { text-decoration: line-through; }

    .slot.free {
      background: var(--bg-success);
      border-color: var(--border-success);
    }

    .time-col {
      min-width: 80px;
      font-size: 13px;
      color: var(--text-secondary);
      padding-top: 2px;
    }

    .time-col span { font-size: 11px; }

    .slot-body { flex: 1; }

    .s-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .s-dur {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .s-type {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    .slot.free .s-type {
      background: var(--bg-success);
      color: var(--text-success);
    }

    .check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-success);
      font-size: 14px;
      transition: all .15s;
    }

    .slot.done .check {
      background: var(--bg-success);
      border-color: var(--border-success);
    }

    .del {
      font-size: 16px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 2px 4px;
      opacity: .35;
      transition: opacity .15s;
    }

    .del:hover { opacity: 1; color: #e24b4a; }

    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* SUGGESTIONS */
    .suggest-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .sug-card {
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      background: var(--bg);
      padding: 14px;
      cursor: pointer;
      transition: all .15s;
    }

    .sug-card:hover {
      border-color: var(--border-info);
      background: var(--bg-info);
    }

    .sug-card:hover .sug-title { color: var(--text-info); }

    .sug-icon {
      font-size: 22px;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .sug-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .sug-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .sug-tag {
      font-size: 11px;
      margin-top: 8px;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 1rem;
      text-align: center;
    }

    .stat-val {
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
    }

    .stat-lbl {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .bar-wrap { margin-top: 1rem; }

    .bar-lbl {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .bar-bg {
      height: 8px;
      border-radius: 4px;
      background: var(--bg-secondary);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--bg-info);
      transition: width .4s;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      padding: 1.5rem;
      width: 340px;
      max-width: 90vw;
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      color: var(--text);
    }

    .modal label {
      font-size: 13px;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 4px;
    }

    .modal input {
      margin-bottom: 12px;
    }

    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1><i class="ti ti-calendar" aria-hidden="true"></i> Minha Rotina</h1>
  <p class="sub">Organize seu dia, marque o que fez e aproveite o tempo livre com inteligência.</p>

  <div class="tabs">
    <button class="tab active" onclick="showTab('agenda', this)">
      <i class="ti ti-clock" aria-hidden="true"></i> Agenda
    </button>
    <button class="tab" onclick="showTab('livre', this)">
      <i class="ti ti-star" aria-hidden="true"></i> Tempo livre
    </button>
    <button class="tab" onclick="showTab('progresso', this)">
      <i class="ti ti-chart-bar" aria-hidden="true"></i> Progresso
    </button>
  </div>

  <!-- AGENDA -->
  <div class="section active" id="tab-agenda">
    <div class="add-form">
      <h3><i class="ti ti-plus" aria-hidden="true"></i> Adicionar atividade</h3>
      <div class="form-row full">
        <input type="text" id="inp-name" placeholder="Nome da atividade (ex: Estudar matemática)">
      </div>
      <div class="form-row">
        <input type="time" id="inp-start" value="08:00">
        <input type="time" id="inp-end" value="09:00">
      </div>
      <div class="form-row">
        <select id="inp-cat">
          <option value="estudo">📚 Estudo</option>
          <option value="trabalho">💼 Trabalho</option>
          <option value="saude">🏃 Saúde</option>
          <option value="pessoal">🏠 Pessoal</option>
          <option value="livre">✨ Tempo livre</option>
        </select>
        <div class="btn-row" style="justify-content:flex-start">
          <button class="btn btn-primary" onclick="addSlot()">Adicionar</button>
        </div>
      </div>
    </div>
    <div class="timeline" id="timeline"></div>
    <div class="empty" id="empty-msg" style="display:none">
      Nenhuma atividade ainda. Adicione sua primeira tarefa acima!
    </div>
  </div>

  <!-- TEMPO LIVRE -->
  <div class="section" id="tab-livre">
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:1rem">
      Clique em uma sugestão para adicioná-la à sua agenda:
    </p>
    <div class="suggest-grid" id="sug-grid"></div>
  </div>

  <!-- PROGRESSO -->
  <div class="section" id="tab-progresso">
    <div class="stats" id="stats"></div>
    <div class="bar-wrap" id="bars"></div>
  </div>
</div>

<!-- Modal horário -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Adicionar sugestão</h3>
    <label>Horário de início</label>
    <input type="time" id="modal-time" value="16:00">
    <div class="btn-row">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmSuggestion()">Adicionar</button>
    </div>
  </div>
</div>

<script>
  // ─── DADOS ───────────────────────────────────────────────
  const SUGGESTIONS = [
    {icon:"ti-book",      title:"Ler um livro",         desc:"30 min de leitura por dia muda tudo",            tag:"mental",      dur:30},
    {icon:"ti-search",    title:"Pesquisar algo novo",   desc:"Escolha um tema que te intriga",                 tag:"curiosidade", dur:20},
    {icon:"ti-brain",     title:"Revisar matéria",       desc:"Revise o conteúdo do dia com flashcards",        tag:"estudo",      dur:25},
    {icon:"ti-pencil",    title:"Escrever no diário",    desc:"Registre ideias, sentimentos e planos",          tag:"reflexão",    dur:15},
    {icon:"ti-headphones",title:"Ouvir podcast",         desc:"Aprenda algo enquanto relaxa",                   tag:"cultura",     dur:30},
    {icon:"ti-walk",      title:"Caminhar",              desc:"10 minutos de movimento renovam a energia",      tag:"saúde",       dur:10},
    {icon:"ti-device-desktop",title:"Aprender online",  desc:"Assista uma aula gratuita rápida",               tag:"habilidade",  dur:20},
    {icon:"ti-plant",     title:"Meditação rápida",      desc:"5 min de respiração e foco",                    tag:"bem-estar",   dur:5},
    {icon:"ti-vocabulary",title:"Aprender palavras",     desc:"Idioma, termos técnicos, vocabulário",           tag:"idioma",      dur:15},
    {icon:"ti-bulb",      title:"Resolver um puzzle",    desc:"Desafie seu raciocínio com um problema",        tag:"lógica",      dur:20},
    {icon:"ti-music",     title:"Ouvir música atento",   desc:"Escolha um álbum e ouça completamente",         tag:"arte",        dur:40},
    {icon:"ti-edit",      title:"Praticar escrita",      desc:"Escreva um parágrafo sobre qualquer coisa",     tag:"criatividade",dur:20},
  ];

  const CAT_LABELS = {
    estudo:  "📚 Estudo",
    trabalho:"💼 Trabalho",
    saude:   "🏃 Saúde",
    pessoal: "🏠 Pessoal",
    livre:   "✨ Tempo livre"
  };

  const DEFAULT_SLOTS = [
    {id:1, name:"Acordar e preparar",  start:"06:30", end:"07:00", cat:"pessoal", done:false},
    {id:2, name:"Café da manhã",       start:"07:00", end:"07:30", cat:"pessoal", done:false},
    {id:3, name:"Estudo principal",    start:"08:00", end:"10:00", cat:"estudo",  done:false},
    {id:4, name:"Tempo livre",         start:"10:00", end:"10:30", cat:"livre",   done:false},
    {id:5, name:"Almoço",             start:"12:00", end:"13:00", cat:"pessoal", done:false},
    {id:6, name:"Revisão de matéria", start:"14:00", end:"15:30", cat:"estudo",  done:false},
    {id:7, name:"Exercício físico",   start:"17:00", end:"18:00", cat:"saude",   done:false},
    {id:8, name:"Jantar e descanso",  start:"19:00", end:"20:00", cat:"pessoal", done:false},
  ];

  // ─── ESTADO ──────────────────────────────────────────────
  let slots = JSON.parse(localStorage.getItem('rotina-slots') || 'null') || DEFAULT_SLOTS;
  let pendingSuggestion = null;

  function save() {
    localStorage.setItem('rotina-slots', JSON.stringify(slots));
  }

  // ─── UTILITÁRIOS ─────────────────────────────────────────
  function toMin(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function addMins(t, mins) {
    const total = toMin(t) + mins;
    const h = Math.floor(total / 60) % 24;
    const m = total % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  function durLabel(s, e) {
    const d = toMin(e) - toMin(s);
    if (d <= 0) return '';
    return d >= 60 ? `${Math.floor(d/60)}h${d%60 ? ` ${d%60}min` : ''}` : `${d} min`;
  }

  // ─── TABS ────────────────────────────────────────────────
  function showTab(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    if (btn) btn.classList.add('active');
    if (id === 'progresso') renderStats();
  }

  // ─── AGENDA ──────────────────────────────────────────────
  function render() {
    const tl = document.getElementById('timeline');
    const em = document.getElementById('empty-msg');
    const sorted = [...slots].sort((a, b) => toMin(a.start) - toMin(b.start));

    if (!sorted.length) {
      tl.innerHTML = '';
      em.style.display = 'block';
      return;
    }
    em.style.display = 'none';

    tl.innerHTML = sorted.map(s => `
      <div class="slot${s.done ? ' done' : ''}${s.cat === 'livre' ? ' free' : ''}" onclick="toggle(${s.id})">
        <div class="time-col">
          ${s.start}<br><span>${s.end}</span>
        </div>
        <div class="slot-body">
          <div class="s-name">${s.name}</div>
          <div class="s-dur">${durLabel(s.start, s.end)}</div>
          <span class="s-type">${CAT_LABELS[s.cat] || s.cat}</span>
        </div>
        <span class="check">${s.done ? '✓' : ''}</span>
        <span class="del" onclick="event.stopPropagation(); del(${s.id})" title="Remover">✕</span>
      </div>`).join('');

    renderStats();
  }

  function toggle(id) {
    const s = slots.find(x => x.id === id);
    if (s) { s.done = !s.done; save(); render(); }
  }

  function del(id) {
    slots = slots.filter(x => x.id !== id);
    save(); render();
  }

  function addSlot() {
    const name  = document.getElementById('inp-name').value.trim();
    const start = document.getElementById('inp-start').value;
    const end   = document.getElementById('inp-end').value;
    const cat   = document.getElementById('inp-cat').value;

    if (!name) { alert('Digite o nome da atividade.'); return; }

    slots.push({ id: Date.now(), name, start, end, cat, done: false });
    save(); render();
    document.getElementById('inp-name').value = '';
  }

  // ─── SUGESTÕES ───────────────────────────────────────────
  function renderSuggestions() {
    document.getElementById('sug-grid').innerHTML = SUGGESTIONS.map((s, i) => `
      <div class="sug-card" onclick="openModal(${i})">
        <div class="sug-icon"><i class="ti ${s.icon}" aria-hidden="true"></i></div>
        <div class="sug-title">${s.title}</div>
        <div class="sug-desc">${s.desc}</div>
        <span class="sug-tag">${s.tag} · ${s.dur} min</span>
      </div>`).join('');
  }

  function openModal(i) {
    pendingSuggestion = i;
    document.getElementById('modal-title').textContent = `Adicionar: ${SUGGESTIONS[i].title}`;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    pendingSuggestion = null;
  }

  function confirmSuggestion() {
    if (pendingSuggestion === null) return;
    const s     = SUGGESTIONS[pendingSuggestion];
    const start = document.getElementById('modal-time').value;
    const end   = addMins(start, s.dur);

    slots.push({ id: Date.now(), name: s.title, start, end, cat: 'livre', done: false });
    save(); render(); closeModal();
    showTab('agenda', document.querySelector('.tab'));
  }

  // Fechar modal clicando fora
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ─── PROGRESSO ───────────────────────────────────────────
  function renderStats() {
    const total   = slots.length;
    const done    = slots.filter(s => s.done).length;
    const pct     = total ? Math.round(done / total * 100) : 0;
    const livreMin = slots
      .filter(s => s.cat === 'livre')
      .reduce((a, s) => a + Math.max(0, toMin(s.end) - toMin(s.start)), 0);

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">atividades</div></div>
      <div class="stat"><div class="stat-val">${done}</div><div class="stat-lbl">concluídas</div></div>
      <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-lbl">do dia feito</div></div>
      <div class="stat"><div class="stat-val">${livreMin}min</div><div class="stat-lbl">tempo livre</div></div>`;

    const cats = ['estudo','trabalho','saude','pessoal','livre'];
    document.getElementById('bars').innerHTML = cats.map(c => {
      const totalC = slots.filter(s => s.cat === c).length;
      const doneC  = slots.filter(s => s.cat === c && s.done).length;
      if (!totalC) return '';
      const p = Math.round(doneC / totalC * 100);
      return `
        <div class="bar-lbl">
          <span>${CAT_LABELS[c]}</span><span>${doneC}/${totalC}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div>`;
    }).join('');
  }

  // ─── INIT ────────────────────────────────────────────────
  renderSuggestions();
  render();
</script>
</body>
</html>
